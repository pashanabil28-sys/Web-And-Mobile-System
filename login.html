<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>Login Polosan (Wireframe)</title>
</head>
<body>
    <div class="container d-flex flex-column justify-content-center align-items-center vh-100" style="max-width: 400px;">
        
        <div class="text-center mb-5">
            <h1 class="fw-bold border-bottom pb-2">
                ABSENSI<br>MAHASISWA
            </h1>
            <small class="text-muted">Desain Interface (Wireframe)</small>
        </div>

        <div class="card border-dark w-100 p-4" style="border-radius: 0;">
            <div class="mb-3">
                <label class="form-label fw-bold small text-uppercase">username / nim</label>
                <div class="input-group border border-dark">
                    <span class="input-group-text bg-transparent border-0"><i class="fa fa-user"></i></span>
                    <input type="text" class="form-control border-0 shadow-none" placeholder="Masukkan Username/NIM">
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label fw-bold small text-uppercase">password</label>
                <div class="input-group border border-dark">
                    <span class="input-group-text bg-transparent border-0"><i class="fa fa-lock"></i></span>
                    <input type="password" class="form-control border-0 shadow-none" placeholder="Masukkan Password">
                    <span class="input-group-text bg-transparent border-0"><i class="fa fa-eye"></i></span>
                </div>
            </div>

            <a href="kursus.html" class="btn btn-outline-dark w-100 py-2 fw-bold text-uppercase" style="border-radius: 0;">
                Masuk
            </a>
        </div>

        <p class="mt-4 text-muted small"></p>
    </div>
</body>
</html>
