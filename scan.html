<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>Scan - Wireframe</title>
</head>
<body>
    <div class="mx-auto border-start border-end" style="max-width: 400px; min-height: 100vh;">
        <div class="p-3 border-bottom border-dark">
            <a href="kursus.html" class="text-dark"><i class="fa fa-arrow-left fs-5"></i></a>
        </div>

        <div class="d-flex justify-content-center align-items-center bg-light border-bottom border-dark" style="height: 300px;">
            <div class="border border-4 border-dark position-relative" style="width: 180px; height: 180px;">
                <div style="position: absolute; width: 100%; height: 2px; background: black; top: 50%;"></div>
                <small class="position-absolute bottom-0 w-100 text-center fw-bold">QR AREA</small>
            </div>
        </div>

        <div class="p-4">
            <div class="card border-dark d-flex flex-row align-items-center p-3 mb-3" style="border-radius: 0;">
                <i class="fa fa-map-marker-alt me-3 fs-3"></i>
                <div><small class="d-block text-muted small">Lokasi GPS:</small><strong>AKTIF</strong></div>
            </div>
            <div class="card border-dark d-flex flex-row align-items-center p-3 mb-4" style="border-radius: 0;">
                <i class="fa fa-camera me-3 fs-3"></i>
                <strong>Ambil Gambar Wajah</strong>
            </div>
            <button class="btn btn-outline-dark w-100 py-3 fw-bold fs-5 text-uppercase" style="border-radius: 0;">
                Mulai Absensi
            </button>
        </div>
    </div>
</body>
</html>
